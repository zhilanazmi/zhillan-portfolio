name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 43.157.206.80
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            set -e
            cd /var/www/zhillan-portfolio
            git pull origin main
            npm ci
            npm run build
            sudo systemctl reload nginx
