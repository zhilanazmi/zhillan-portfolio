<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#F4F1EA" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0F0F0E" media="(prefers-color-scheme: dark)" />
    <meta
      name="description"
      content="Zhillan Azmi — Fullstack & Web Developer based in Bandung, Indonesia. Building user-friendly, responsive web applications with Laravel, JavaScript, and modern stacks."
    />
    <meta property="og:title" content="Zhillan Azmi — Fullstack Developer" />
    <meta
      property="og:description"
      content="Portfolio of Zhillan Azmi, Fullstack & Web Developer based in Bandung, Indonesia."
    />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=Inter:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <title>Zhillan Azmi — Fullstack Developer</title>
    <script>
      (function () {
        try {
          var t = localStorage.getItem("theme");
          var prefersDark =
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches;
          if (t === "dark" || (!t && prefersDark)) {
            document.documentElement.classList.add("dark");
          } else {
            document.documentElement.classList.remove("dark");
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
